<script>
    // ==========================================
    // 🔐 GESTIÓN DE USUARIOS Y CONTRASEÑAS
    // ==========================================
    const USUARIOS = {
        "JUAN CAMILO COY": "2905",
        "ANDRES FELIPE HENAO": "9666",
        "CAMILO HERRERA": "1053",
        "JUAN FELIPE LOPEZ": "5370",
        "FELIPE DE LOS RIOS": "1397",
        "FRANCISCO SANCHEZ": "1803",
        "ISDECOM": "5593"
    };

    // TU LINK EXACTO DE APPS SCRIPT
    const apiURL = "https://script.google.com/macros/s/AKfycbySWEZLtq99Vw3G3DRtnAzfkiVlKFMUYcuJzqeMNbTA5jbCZ7Oc_cxk-PG9A6PTuBthNA/exec";

    function cambiarPestana(seccion) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('activa'));
        document.querySelectorAll('.seccion-formulario').forEach(s => s.classList.remove('activa'));
        const secciones = ['reporte', 'agenda', 'dispositivos', 'copy', 'electronicos', 'semaforo'];
        document.querySelectorAll('.tab')[secciones.indexOf(seccion)].classList.add('activa');
        document.getElementById('seccion' + seccion.charAt(0).toUpperCase() + seccion.slice(1)).classList.add('activa');
    }

    let tInactividad; const T_LIMITE = 3 * 60 * 1000;
    function cerrar() { localStorage.removeItem("isdecom"); document.getElementById("appScreen").style.display = "none"; document.getElementById("loginScreen").style.display = "block"; document.getElementById("pinInput").value = ""; document.getElementById("userInput").value = ""; window.scrollTo(0,0); }
    function reiniciarT() { clearTimeout(tInactividad); if(localStorage.getItem("isdecom")==="ok") tInactividad = setTimeout(cerrar, T_LIMITE); }
    window.onload=reiniciarT; document.onmousemove=reiniciarT; document.onkeypress=reiniciarT; document.ontouchstart=reiniciarT; document.onclick=reiniciarT;
    
    document.addEventListener("DOMContentLoaded", () => { if(localStorage.getItem("isdecom")==="ok") iniciarApp(); });
    
    // Validar el Usuario seleccionado y su Contraseña
    document.getElementById("btnDesbloquear").addEventListener("click", () => { 
        let user = document.getElementById("userInput").value;
        let pass = document.getElementById("pinInput").value;
        
        if(user && USUARIOS[user] && USUARIOS[user] === pass) { 
            localStorage.setItem("isdecom","ok"); 
            iniciarApp(); 
        } else { 
            document.getElementById("errorPin").style.display="block"; 
            document.getElementById("pinInput").value=""; 
        }
    });
    
    document.getElementById("btnSalir").addEventListener("click", cerrar);

    function iniciarApp() { document.getElementById("loginScreen").style.display="none"; document.getElementById("appScreen").style.display="block"; document.getElementById("errorPin").style.display="none"; cargarClientes(); reiniciarT(); }

    function cargarClientes() {
        const i = document.querySelectorAll('.inputClienteCompartido'); i.forEach(inp => inp.placeholder = "⏳ CONECTANDO...");
        var s = document.createElement('script'); s.src = apiURL + (apiURL.includes('?')?'&':'?') + "callback=procesarClientes"; document.body.appendChild(s);
    }
    function procesarClientes(d) {
        const i = document.querySelectorAll('.inputClienteCompartido'); const l = document.getElementById('opcionesClientes'); l.innerHTML = ''; 
        if(d && d.length>0){ d.forEach(c => { let o = document.createElement('option'); o.value=c; l.appendChild(o); }); i.forEach(inp => inp.placeholder = "✅ " + d.length + " LISTOS.");
        } else i.forEach(inp => inp.placeholder = "⚠️ MANUAL...");
    }

    function procesarArchivo(file) {
        return new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = e => {
                if(file.type.startsWith('image/')) {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if(w>h){ if(w>1024){ h=Math.round(h*=1024/w); w=1024; } } else { if(h>1024){ w=Math.round(w*=1024/h); h=1024; } }
                        const c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(img,0,0,w,h);
                        res({ base64: c.toDataURL('image/jpeg', 0.7), name: file.name, mimeType: 'image/jpeg' });
                    }
                } else {
                    res({ base64: e.target.result, name: file.name, mimeType: file.type });
                }
            };
        });
    }

    async function procArchivos(id) {
        const input = document.getElementById(id);
        if(!input) return [];
        const f = input.files; let arr = [];
        if(f.length>0){ 
            let p=[]; 
            for(let i=0; i<f.length; i++) {
                if(f[i].type.startsWith('video/') && f[i].size > 15728640) {
                    alert("⚠️ EL VIDEO '" + f[i].name + "' PESA MÁS DE 15MB. ELIMÍNALO Y GRABA UNO MÁS CORTO.");
                    continue; 
                }
                p.push(procesarArchivo(f[i])); 
            }
            arr = await Promise.all(p); 
        }
        return arr;
    }

    document.getElementById('formReporte').addEventListener('submit', async (e) => { e.preventDefault(); mostrarC('R',true); enviar("reporte", await procArchivos('fotoUploadR')); });
    document.getElementById('formDispositivos').addEventListener('submit', async (e) => { e.preventDefault(); mostrarC('D',true); enviar("dispositivos", await procArchivos('fotoUploadD')); });
    document.getElementById('formCopy').addEventListener('submit', async (e) => { e.preventDefault(); mostrarC('C',true); enviar("copy", await procArchivos('fotoUploadC')); });
    
    ['Agenda','Electronicos','Semaforo'].forEach(m => document.getElementById('form'+m).addEventListener('submit', (e) => { e.preventDefault(); mostrarC(m.charAt(0),true); enviar(m.toLowerCase(), []); }));

    function mostrarC(t, e) { document.getElementById('loader'+t).style.display = e?'block':'none'; document.getElementById('btnEnviar'+t).style.display = e?'none':'block'; }

    function enviar(tipo, arr) {
        let d = { tipoFormulario: tipo, fotos: arr };
        
        if (tipo==="reporte") { d = {...d, tipoVisita: v('tipoVisitaR'), fecha: v('fechaR'), horaInicio: v('horaInicioR'), horaFinal: v('horaFinalR'), cliente: v('clienteR'), sede: v('sedeR'), servicio: v('servicioR'), materiales: v('materialesR'), estado: v('estadoR'), tecnico: v('tecnicoR')}; }
        else if (tipo==="agenda") { 
            let agendarCal = document.getElementById('syncCalendarA').checked;
            d = {...d, syncCalendar: agendarCal, fechaServicio: v('fechaA'), horaServicio: v('horaA'), cliente: v('clienteA'), tarea: v('tareaA'), asignado: v('asignadoA'), estado: v('estadoA'), observaciones: v('observacionesA')}; 
        }
        // MODIFICADO: Ahora mandamos el Teléfono, Equipo y Contraseña por separado
        else if (tipo==="dispositivos") { 
            d = {...d, fecha: v('fechaD'), cliente: v('clienteD'), telefono: v('telefonoD'), equipo: v('equipoD'), contrasena: v('contrasenaD'), actividad: v('actividadD'), estado: v('estadoD'), observaciones: v('observacionesD')}; 
        }
        else if (tipo==="copy") { d = {...d, fecha: v('fechaC'), cliente: v('clienteC'), actividad: v('actividadC'), tecnicoDeja: v('tecnicoDejaC'), estado: v('estadoC'), observaciones: v('observacionesC')}; }
        else if (tipo==="electronicos") { d = {...d, fecha: v('fechaE'), cliente: v('clienteE'), electronico: v('electronicoE'), actividad: v('actividadE'), estado: v('estadoE'), observaciones: v('observacionesE')}; }
        else if (tipo==="semaforo") { d = {...d, fecha: v('fechaS'), cliente: v('clienteS'), actividad: v('actividadS'), asignadoPor: v('asignadoPorS'), revisadoPor: v('revisadoPorS'), estado: v('estadoS'), tipoCliente: v('tipoClienteS'), observaciones: v('observacionesS')}; }

        fetch(apiURL, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(d) })
        .then(r => r.json()).then(res => {
            
            // =================================================================
            // 📲 WHATSAPP
            // =================================================================
            if (tipo === 'reporte') {
                const mensajeWa = "✅ *NUEVO REPORTE ISDECOM*\n\n" +
                                  "👷‍♂️ *Técnico:* " + v('tecnicoR') + "\n" +
                                  "🏢 *Cliente:* " + v('clienteR') + "\n" +
                                  "⏱️ *Horario:* " + v('horaInicioR') + " a " + v('horaFinalR') + "\n\n" +
                                  "📝 *Descripción del Servicio:*\n" + v('servicioR') + "\n\n" +
                                  "🛠️ *Materiales Usados:*\n" + v('materialesR');
                
                const urlWa = "https://api.whatsapp.com/send?text=" + encodeURIComponent(mensajeWa);
                window.open(urlWa, '_blank');
            }

            if (tipo==='dispositivos') alert("✅ TICKET: " + res.idGenerado); else alert("✅ GUARDADO EN DRIVE Y EXCEL.");
            document.getElementById('form'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).reset(); mostrarC(tipo.charAt(0).toUpperCase(), false);
            window.scrollTo(0, 0); cargarClientes();
        }).catch(() => { alert("❌ ERROR AL GUARDAR."); mostrarC(tipo.charAt(0).toUpperCase(), false); });
    }
    function v(id) { return document.getElementById(id) ? document.getElementById(id).value : ""; }
</script>
